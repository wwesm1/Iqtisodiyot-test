<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iqtisodiyot - Javoblarni O'rganing</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<style>

:root {
  --bg:#f5f7fa;--surface:#fff;--surface2:#f0f4f8;--border:#e2e8f0;
  --primary:#2563eb;--primary-dk:#1d4ed8;--primary-lt:#eff6ff;
  --ok:#16a34a;--ok-lt:#f0fdf4;--ok-border:#86efac;
  --text:#1e293b;--muted:#64748b;--light:#94a3b8;
  --sh:0 4px 16px rgba(0,0,0,.08);--r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-logo{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800;flex-shrink:0}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hdr-sub{font-size:11px;color:var(--muted);font-weight:500}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{background:var(--primary-lt);color:var(--primary);font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid #bfdbfe}
.app{display:flex;min-height:calc(100vh - 64px)}
.sidebar{width:272px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;display:flex;flex-direction:column}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--light);padding:6px 24px 4px}
.sb-btn{width:calc(100% - 16px);text-align:left;padding:9px 16px;border:none;background:transparent;cursor:pointer;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:9px;margin:1px 8px}
.sb-btn:hover{background:var(--surface2);color:var(--text)}
.sb-btn.active{background:var(--primary-lt);color:var(--primary)}
.sb-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.sb-cnt{margin-left:auto;font-size:10.5px;font-weight:700;background:var(--border);color:var(--muted);padding:2px 7px;border-radius:10px}
.sb-btn.active .sb-cnt{background:#bfdbfe;color:var(--primary)}
.sb-divider{border:none;border-top:1px solid var(--border);margin:10px 16px}
.main{flex:1;padding:28px 24px;max-width:820px}
/* HOME */
.home-title{font-family:'Merriweather',serif;font-size:26px;font-weight:700;margin-bottom:6px;line-height:1.3}
.home-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:10px}
.card:hover{border-color:var(--primary);box-shadow:var(--sh);transform:translateY(-2px)}
.card-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.card-title{font-size:13.5px;font-weight:700;line-height:1.3}
.card-cnt{font-size:12px;color:var(--muted)}
.card-go{margin-top:auto;color:var(--primary);font-size:12.5px;font-weight:700}
/* BROWSE */
.browse-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.browse-name{font-size:19px;font-weight:800}
.browse-cnt{color:var(--muted);font-size:13px;font-weight:600;margin-left:auto}
.search-wrap{margin-bottom:20px;position:relative}
.search-input{width:100%;padding:10px 16px 10px 40px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:14px;background:var(--surface);color:var(--text);outline:none;transition:border .15s}
.search-input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--light);font-size:15px;pointer-events:none}
.q-list{display:flex;flex-direction:column;gap:12px}
.q-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.q-num{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--primary);margin-bottom:8px}
.q-text{font-size:15px;font-weight:600;color:var(--text);line-height:1.55;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--surface2);font-size:13.5px;font-weight:500;color:var(--muted);line-height:1.5}
.opt.correct{border-color:var(--ok-border);background:var(--ok-lt);color:var(--ok);font-weight:700}
.opt-lbl{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;min-width:22px;border-radius:5px;background:var(--border);font-size:11px;font-weight:700;color:var(--muted);margin-top:1px}
.opt.correct .opt-lbl{background:var(--ok);color:#fff}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:28px;flex-wrap:wrap}
.pg-btn{padding:7px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--text);transition:all .15s}
.pg-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.pg-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pg-btn:disabled{opacity:.4;cursor:default}
.pg-info{font-size:13px;color:var(--muted);font-weight:600;padding:0 8px}
@media(max-width:768px){.sidebar{display:none}.main{padding:20px 16px;max-width:100%}.home-title{font-size:20px}}

</style>
</head>

const SUBJECTS = [
  {id:'Statistika',             label:'Statistika',               icon:'📊', bg:'#fff7ed'},
  {id:'Makroiqtisodiyot',       label:'Makroiqtisodiyot',         icon:'🌍', bg:'#f0fdf4'},
  {id:'Iqtisodiyot Nazariyasi', label:'Iqtisodiyot Nazariyasi',   icon:'📚', bg:'#fdf4ff'},
  {id:'Mikroiqtisodiyot',       label:'Mikroiqtisodiyot',         icon:'🔬', bg:'#eff6ff'},
  {id:'Institutsional Iqtisodiyot', label:'Institutsional Iqt.', icon:'🏛️', bg:'#fefce8'},
];

const PAGE_SIZE = 20;
const LABELS = ['A','B','C','D'];

let S = {screen:'home', subject:null, questions:[], page:1, search:''};

const $ = id => document.getElementById(id);

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function openSubject(id) {
  const qs = QUESTIONS.filter(q => q.subject === id);
  S = {screen:'browse', subject:id, questions:qs, page:1, search:''};
  setSbActive(id);
  render();
}

function goHome() {
  S = {screen:'home', subject:null, questions:[], page:1, search:''};
  setSbActive('home');
  render();
}

function setSbActive(id) {
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  const el = $('sb-' + id.replace(/\s+/g,'-'));
  if (el) el.classList.add('active');
}

function render() {
  const m = $('main');
  if (S.screen === 'home') renderHome(m);
  else renderBrowse(m);
}

function renderHome(m) {
  const counts = {};
  QUESTIONS.forEach(q => { counts[q.subject] = (counts[q.subject]||0)+1; });

  const cards = SUBJECTS.map(s =>
    '<div class="card" onclick="openSubject(\''+s.id+'\')" tabindex="0">'
    + '<div class="card-ico" style="background:'+s.bg+'">'+s.icon+'</div>'
    + '<div><div class="card-title">'+s.label+'</div>'
    + '<div class="card-cnt">'+(counts[s.id]||0)+' ta savol</div></div>'
    + '<div class="card-go">Ko\'rish &rarr;</div>'
    + '</div>'
  ).join('');

  m.innerHTML = '<div style="padding:20px 0">'
    + '<div class="home-title">Javoblarni o\'rganing</div>'
    + '<div class="home-sub">Fan tanlang — barcha savollar to\'g\'ri javob bilan yashil rangda ko\'rsatiladi.</div>'
    + '<div class="cards">'+cards+'</div>'
    + '</div>';
}

function renderBrowse(m) {
  const meta = SUBJECTS.find(s => s.id === S.subject) || {};
  const filtered = S.search
    ? S.questions.filter(q =>
        q.question.toLowerCase().includes(S.search.toLowerCase()) ||
        q.options.some(o => o.toLowerCase().includes(S.search.toLowerCase()))
      )
    : S.questions;

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const page = Math.min(S.page, totalPages || 1);
  const start = (page-1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  const items = slice.map((q, i) => {
    const opts = q.options.map((o, oi) =>
      '<div class="opt'+(oi===q.correct?' correct':'')+'">'
      + '<span class="opt-lbl">'+LABELS[oi]+'</span>'
      + '<span>'+esc(o)+'</span>'
      + '</div>'
    ).join('');

    return '<div class="q-item">'
      + '<div class="q-num">Savol '+(start+i+1)+'</div>'
      + '<div class="q-text">'+esc(q.question)+'</div>'
      + '<div class="opts">'+opts+'</div>'
      + '</div>';
  }).join('');

  // Pagination buttons
  let pages = '';
  if (totalPages > 1) {
    pages += '<button class="pg-btn" onclick="setPage('+(page-1)+')" '+(page<=1?'disabled':'')+'>&#8592;</button>';
    
    let start_p = Math.max(1, page-2);
    let end_p = Math.min(totalPages, start_p+4);
    if (end_p - start_p < 4) start_p = Math.max(1, end_p-4);

    for (let p = start_p; p <= end_p; p++) {
      pages += '<button class="pg-btn'+(p===page?' active':'')+'" onclick="setPage('+p+')">'+p+'</button>';
    }
    pages += '<button class="pg-btn" onclick="setPage('+(page+1)+')" '+(page>=totalPages?'disabled':'')+'>&#8594;</button>';
    pages += '<span class="pg-info">'+filtered.length+' ta savol</span>';
  }

  m.innerHTML =
    '<div class="browse-hdr">'
    + '<span style="width:34px;height:34px;border-radius:8px;background:'+meta.bg+';display:inline-flex;align-items:center;justify-content:center;font-size:17px">'+meta.icon+'</span>'
    + '<span class="browse-name">'+esc(S.subject)+'</span>'
    + '<button onclick="goHome()" style="margin-left:auto;padding:7px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--rs);font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--text)">&#127968; Orqaga</button>'
    + '</div>'
    + '<div class="search-wrap">'
    + '<span class="search-icon">&#128269;</span>'
    + '<input class="search-input" id="search-inp" type="text" placeholder="Savol yoki javob bo\'yicha qidiring..." value="'+esc(S.search)+'" oninput="onSearch(this.value)">'
    + '</div>'
    + '<div class="q-list" id="q-list">'+items+'</div>'
    + (totalPages > 1 ? '<div class="pagination">'+pages+'</div>' : '');
}

function onSearch(val) {
  S.search = val;
  S.page = 1;
  renderBrowse($('main'));
  // keep focus
  const inp = $('search-inp');
  if (inp) { inp.focus(); inp.setSelectionRange(val.length, val.length); }
}

function setPage(p) {
  S.page = p;
  renderBrowse($('main'));
  window.scrollTo({top:0, behavior:'smooth'});
}

function initSidebar() {
  const counts = {};
  QUESTIONS.forEach(q => { counts[q.subject]=(counts[q.subject]||0)+1; });
  $('total-badge').textContent = QUESTIONS.length + ' ta savol';

  let html = '<button class="sb-btn active" id="sb-home" onclick="goHome()">'
    + '<span class="sb-icon" style="background:#eff6ff">&#127968;</span>'
    + '<span>Bosh sahifa</span></button>'
    + '<div style="border-top:1px solid var(--border);margin:8px 8px 4px"></div>'
    + '<div class="sb-label">Fanlar</div>';

  SUBJECTS.forEach(s => {
    const safe = s.id.replace(/\s+/g,'-');
    html += '<button class="sb-btn" id="sb-'+safe+'" onclick="openSubject(\''+s.id+'\')"> '
      + '<span class="sb-icon" style="background:'+s.bg+'">'+s.icon+'</span>'
      + '<span style="flex:1;text-align:left">'+s.label.substring(0,20)+'</span>'
      + '<span class="sb-cnt">'+(counts[s.id]||0)+'</span>'
      + '</button>';
  });

  $('sb-content').innerHTML = html;
}

initSidebar();
render();

</script>
</body>
</html>
